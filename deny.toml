# cargo-deny configuration — supply-chain & license policy.
# Run with: cargo deny check

[advisories]
version = 2
yanked = "deny"
# Triaged unmaintained-crate advisories. Re-evaluate when the upstream tree drops them.
ignore = [
    # `paste` (proc-macro) is unmaintained but has no security surface; pulled in transitively
    # via ratatui. No safe replacement is wired through yet. Low risk; revisit on ratatui bumps.
    "RUSTSEC-2024-0436",
    # `atomic-polyfill` unmaintained; pulled transitively via postcard -> heapless. No security
    # surface for our use. Revisit when postcard/heapless drop it.
    "RUSTSEC-2023-0089",
]

[licenses]
version = 2
# Only permissive licenses compatible with Apache-2.0 OR MIT.
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
# Ban real `*` version requirements on external crates, but allow internal workspace
# path dependencies (which have no version field) — they are not a supply-chain risk.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
