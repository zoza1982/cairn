# cargo-deny configuration — supply-chain & license policy.
# Run with: cargo deny check

[advisories]
version = 2
yanked = "deny"
# Triaged unmaintained-crate advisories. Re-evaluate when the upstream tree drops them.
ignore = [
    # `paste` (proc-macro) is unmaintained but has no security surface; pulled in transitively
    # via ratatui. No safe replacement is wired through yet. Low risk; revisit on ratatui bumps.
    "RUSTSEC-2024-0436",
    # `atomic-polyfill` unmaintained; pulled transitively via postcard -> heapless. No security
    # surface for our use. Revisit when postcard/heapless drop it.
    "RUSTSEC-2023-0089",
    # `instant` is unmaintained; pulled transitively by the Azure SDK's `azure_core` 0.21 stack
    # (`http-types`), behind the non-default `azure` feature (Linux-only-full). It is a wall-clock
    # shim with no security surface for our use. No fix in the 0.21 line (the 1.0 SDK rewrite drops
    # it but is AAD-only and can't talk to Azurite). Revisit if/when we move to the 1.0 Azure SDK.
    "RUSTSEC-2024-0384",
    # `http-types` `Authorization::value`/`WwwAuthenticate::value` can violate ASCII invariants
    # (notice). Pulled by `azure_core` 0.21 behind the non-default `azure` feature. Our header values
    # are SDK/credential-generated (base64 keys, SAS tokens — all ASCII), so the invariant holds in
    # practice. No fix in the 0.21 line. Revisit on a move to the 1.0 Azure SDK.
    "RUSTSEC-2026-0174",
    # Marvin timing side-channel in the `rsa` crate (pulled by russh/ssh-key for SSH RSA key
    # support, behind the non-default `ssh` feature). No fixed upstream version exists. The attack is
    # a timing oracle on RSA *decryption* (PKCS#1 v1.5); Cairn's SSH client only *signs* an auth
    # challenge with the user's key — it never decrypts attacker-controlled ciphertext — so the
    # client-side exposure is minimal. Mitigation: prefer Ed25519 keys. Revisit when `rsa` ships a fix.
    "RUSTSEC-2023-0071",
    # `quick-xml` 0.31 DoS advisories: quadratic run time checking a start tag for duplicate
    # attribute names (0194) and unbounded namespace-declaration allocation in `NsReader` (0195).
    # Pinned transitively by `azure_core` 0.21 (`quick-xml = "0.31"`), behind the non-default `azure`
    # feature. Both are memory/CPU DoS on XML parsing; Cairn only parses responses from the user's
    # own configured Azure Blob endpoint, not arbitrary untrusted XML, so exposure is minimal. The
    # fix landed in quick-xml 0.37+, which azure_core 0.21 cannot accept (no 0.31.x backport exists).
    # Revisit on a move to the 1.0 Azure SDK (tracked with the other azure_core 0.21 advisories above).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Only permissive licenses compatible with Apache-2.0 OR MIT.
allow = [
    "Apache-2.0",
    # wasmtime / cranelift and several Bytecode Alliance crates use this; still permissive.
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    # Community Data License Agreement – Permissive 2.0. Carried by `webpki-root-certs` (the Mozilla
    # CA root bundle, pulled via rustls-platform-verifier → reqwest under the `gcs` feature). It is a
    # permissive license for *data* (the cert set), with no copyleft on our code. Safe to allow.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
# Ban real `*` version requirements on external crates, but allow internal workspace
# path dependencies (which have no version field) — they are not a supply-chain risk.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
